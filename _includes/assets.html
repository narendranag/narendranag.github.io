<link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}?v={{ site.time | date: '%s' }}" />
<link rel="stylesheet" href="{{ "/assets/css/fonts.css" | relative_url }}?v={{ site.time | date: '%s' }}" />
<script src="{{ "/assets/main.js" | relative_url }}?v={{ site.time | date: '%s' }}" defer></script>
{%- if "chapter,post,page" contains page.layout -%}
{%- if site.theme_setting.code or page.code -%}
<link rel="stylesheet" href="{{ "/assets/css/tomorrow.css" | relative_url }}" />
<script src="{{ "/assets/js/highlight.js" | relative_url }}" defer></script>
{%- endif -%}
{%- if site.theme_setting.math or page.math -%}
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" defer></script>
{%- endif -%}
{%- if site.theme_setting.mermaid or page.mermaid -%}
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js" defer></script>
{%- endif -%}
{%- endif -%}
