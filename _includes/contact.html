<aside class="post__contact">
  {%- assign about_page_path = site.theme_setting.about_page | default: "index.md" %}
  {%- assign about_page = site.pages | where: "path", about_page_path | first -%}
  <div class="post__contact-inner">
    <div class="post__contact-avatar"></div>
    <div class="post__contact-info">
      <h4><a href="{{ about_page.url | relative_url }}">Written By {{ site.author | default: site.title }}</a></h4>
      {{ site.description | markdownify }}
    </div>
  </div>
</aside>
